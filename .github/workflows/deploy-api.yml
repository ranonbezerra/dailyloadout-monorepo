name: Deploy API + infra (production)

# Migration-gated deploy of the API/infra to the VPS over SSH, from a
# GitHub-hosted (ephemeral) runner. ONE pipeline per surface — web/app/backoffice
# deploy separately (see DEPLOYMENT.md §1.10); only the API carries a database, so
# only it needs the migration gate. Branch protection should require the CI checks
# on `main`, so only green code reaches here. The migrate-first / rollback logic
# lives in infra/deploy/deploy.sh (runs on the VPS); this just invokes it.
#
# Required secrets (Settings → Secrets → Actions, ideally under the
# "production" environment):
#   VPS_HOST              the VPS hostname / IP
#   VPS_USER             the deploy user
#   VPS_SSH_KEY          the deploy private key (its public key in the user's
#                        authorized_keys, ideally with a forced command — see
#                        DEPLOYMENT.md §1.10)
#   VPS_SSH_KNOWN_HOSTS  (optional) the VPS host key, to pin it instead of TOFU

on:
  push:
    branches: [main]
    # Only the backend triggers an API deploy — web/app live in their own pipelines.
    paths:
      - "packages/api/**"
      - "infra/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

# Never run two deploys at once; don't cancel an in-flight deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The "production" environment enables deployment history + an optional
    # required-reviewer manual gate (Settings → Environments).
    environment: production
    timeout-minutes: 15
    steps:
      - name: Deploy over SSH (migration-gated)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${VPS_SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            # TOFU fallback — prefer pinning VPS_SSH_KNOWN_HOSTS in prod.
            ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          # The on-VPS script does: backup -> fetch -> alembic upgrade head
          # (gate) -> restart -> health-check -> rollback. A non-zero exit here
          # fails the deploy; the previous version keeps serving.
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            "${DL_REMOTE_DEPLOY_CMD:-/opt/dailyloadout/infra/deploy/deploy.sh}"
