name: CI — App

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "packages/app/**"
      - ".github/workflows/ci-app.yml"

defaults:
  run:
    working-directory: packages/app

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - "packages/app/**"
              - ".github/workflows/ci-app.yml"

  app-quality:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.3"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed .

      - name: Flutter analyze
        run: flutter analyze

  app-test:
    needs: [changes, app-quality]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.3"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter test
        run: flutter test --coverage

  app-status:
    if: always()
    needs: [changes, app-quality, app-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        working-directory: .
        run: |
          if [ "${{ needs.changes.outputs.app }}" != "true" ]; then
            echo "No App changes detected — skipping."
            exit 0
          fi
          if [ "${{ needs.app-quality.result }}" != "success" ]; then
            echo "App quality checks failed."
            exit 1
          fi
          if [ "${{ needs.app-test.result }}" != "success" ]; then
            echo "App tests failed."
            exit 1
          fi
          echo "All App checks passed."
