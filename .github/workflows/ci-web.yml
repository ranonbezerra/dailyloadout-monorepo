name: CI — Web

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - ".github/workflows/ci-web.yml"

defaults:
  run:
    working-directory: packages/web

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - "packages/web/**"
              - ".github/workflows/ci-web.yml"

  web-quality:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run lint

      - name: TypeScript check
        run: bun run tsc -b --noEmit

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  web-status:
    if: always()
    needs: [changes, web-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.changes.outputs.web }}" != "true" ]; then
            echo "No Web changes detected — skipping."
            exit 0
          fi
          if [ "${{ needs.web-quality.result }}" != "success" ]; then
            echo "Web quality checks failed."
            exit 1
          fi
          echo "All Web checks passed."
