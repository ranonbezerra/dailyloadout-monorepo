services:
  postgres:
    image: postgres:18-alpine
    container_name: dl-postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dailyloadout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dailyloadout}
      POSTGRES_DB: ${POSTGRES_DB:-dailyloadout}
    volumes:
      - dl_postgres_data:/var/lib/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dailyloadout}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dl-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - dl_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  taskiq-worker:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    container_name: dl-taskiq-worker
    command: ["taskiq", "worker", "dailyloadout.infrastructure.tasks.debrief_extraction:broker"]
    env_file: ./packages/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dl_postgres_data:
  dl_redis_data:
